<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qeydiyyat Formu</title>
</head>
<body>
 <form>
   <label for="name">Adınız:</label><br>
   <input type="text" placeholder="adınızı yazın"><br><br>

   <label for="surname">Soyadınız:</label><br>
   <input type="text" placeholder="soyadınızı yazın"><br><br>

   <label for="email">Email:</label><br>
   <input type="email" placeholder="email adresinizi yazın"><br><br>

   <label for="age">Yaşınız:</label><br>
   <input type="number"placeholder="yaşınızı yazın"><br><br>

   <label for="birthDate">Doğum Tarixi:</label><br>
   <input type="date" placeholder="tarix seçin"><br><br>

   <label for="password">Şifrə:</label><br>
   <input type="password" placeholder="şifrenizi yazın"><br><br>

   <label for="text">Haqqında:</label><br>
   <textarea name="text" id="text" cols="30" rows="5" placeholder="Əlavə məlumat yazın"></textarea><br>
    
   <label for="name">Şəhər seçin:</label><br>
   <input type="checkbox" name="name" id="name" value="Bakı">
   <label for="name">Bakı</label><br>
   <input type="checkbox" name="name" id="name1" value="Gəncə">
   <label for="name1">Gəncə</label><br>
   <input type="checkbox" name="name" id="name2" value="Sumqayıt"> 
   <label for="name2">Sumqayıt</label><br>
   <input type="checkbox" name="name" id="name3" value="Lənkəran">
   <label for="name3">Lənkəran</label><br>
   <input type="checkbox" name="name" id="name4" value="Şəki">
   <label for="name4">Şəki</label><br>
   
   <label>Cins:</label><br>
   <input type="radio" name="gender" id="male" value="male">
   <label> Kişi</label>
   <input type="radio" name="gender" id="female" value="female">
   <label> Qadın</label><br><br>

   <label>Seçim</label><br>
   <select>
       <option value="1">Musiqi</option>
       <option value="2">Film</option>
       <option value="3">Kitab</option>
       <option value="4">Səyahət</option>
   </select><br><br>
   
   <input type="submit" value="Göndər">
   <input type="reset" value="Təmizlə">
 </form>
</body>
</html>
